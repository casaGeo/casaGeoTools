name: Python release

on:
  push:
    tags: [ 'v[0-9]*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version-file: '.tool-versions'
      - name: Install dependencies
        run: uv sync --locked --all-extras --dev
      - name: Build project
        run: uv build
      #      - name: Smoke test (wheel)
      #        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py
      #      - name: Smoke test (source distribution)
      #        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-dists
          path: dist/

  publish-github:
    needs: build
    if: ${{ ! contains(github.ref_name, '.dev') }}
    runs-on: ubuntu-latest
    environment:
      name: github-releases
      url: ${{ format('https://github.com/{0}/releases', github.repository) }}
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-dists
          path: dist/
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'c') }}
          fail_on_unmatched_files: true
          working_directory: dist
          files: |
            *.tar.gz
            *.whl

  publish-pypi:
    needs: build
    if: ${{ ! contains(github.ref_name, '.dev') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: ${{ format('https://pypi.org/project/{0}', vars.PYPI_PROJECT_NAME) }}
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: release-dists
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
